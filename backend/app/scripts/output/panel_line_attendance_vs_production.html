<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel Line Attendance vs Production</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      margin: 20px;
      color: #1f2937;
      background: #f9fafb;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }
    .meta {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
      margin-bottom: 12px;
    }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    select {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      background: #fff;
    }
    #timeseries, #scatter {
      width: 100%;
      min-height: 420px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Panel Line Attendance vs Production</h2>
    <div class="meta">Interactive report generated by script. Y-axis for scatter is always production (panels/day).</div>
    <div class="meta">Rows: 33 | Date range: 2026-01-05 to 2026-02-17</div>
  </div>

  <div class="card">
    <h3>Time Series</h3>
    <div id="timeseries"></div>
  </div>

  <div class="card">
    <h3>Scatter + Trendline</h3>
    <div class="controls">
      <label for="metricSelect">X metric:</label>
      <select id="metricSelect">
        <option value="panel_line_total">Panel line total attendance (count)</option>
<option value="station_count::Puente 1">Puente 1 attendance (count)</option>
<option value="station_share::Puente 1">Puente 1 attendance share</option>
      </select>
      <span id="scatterStats" class="meta"></span>
    </div>
    <div id="scatter"></div>
  </div>

  <script>
    const rows = [{"date": "2026-01-05", "production_panels": 19, "panel_line_total": 12, "stations": {"Puente 1": {"count": 3, "share": 0.25}}}, {"date": "2026-01-06", "production_panels": 33, "panel_line_total": 12, "stations": {"Puente 1": {"count": 3, "share": 0.25}}}, {"date": "2026-01-07", "production_panels": 27, "panel_line_total": 13, "stations": {"Puente 1": {"count": 3, "share": 0.23076923076923078}}}, {"date": "2026-01-08", "production_panels": 28, "panel_line_total": 13, "stations": {"Puente 1": {"count": 3, "share": 0.23076923076923078}}}, {"date": "2026-01-09", "production_panels": 22, "panel_line_total": 13, "stations": {"Puente 1": {"count": 3, "share": 0.23076923076923078}}}, {"date": "2026-01-12", "production_panels": 28, "panel_line_total": 13, "stations": {"Puente 1": {"count": 3, "share": 0.23076923076923078}}}, {"date": "2026-01-13", "production_panels": 26, "panel_line_total": 12, "stations": {"Puente 1": {"count": 3, "share": 0.25}}}, {"date": "2026-01-14", "production_panels": 26, "panel_line_total": 13, "stations": {"Puente 1": {"count": 3, "share": 0.23076923076923078}}}, {"date": "2026-01-15", "production_panels": 30, "panel_line_total": 13, "stations": {"Puente 1": {"count": 3, "share": 0.23076923076923078}}}, {"date": "2026-01-16", "production_panels": 25, "panel_line_total": 13, "stations": {"Puente 1": {"count": 3, "share": 0.23076923076923078}}}, {"date": "2026-01-19", "production_panels": 26, "panel_line_total": 13, "stations": {"Puente 1": {"count": 2, "share": 0.15384615384615385}}}, {"date": "2026-01-20", "production_panels": 27, "panel_line_total": 12, "stations": {"Puente 1": {"count": 2, "share": 0.16666666666666666}}}, {"date": "2026-01-21", "production_panels": 27, "panel_line_total": 13, "stations": {"Puente 1": {"count": 2, "share": 0.15384615384615385}}}, {"date": "2026-01-22", "production_panels": 23, "panel_line_total": 13, "stations": {"Puente 1": {"count": 2, "share": 0.15384615384615385}}}, {"date": "2026-01-23", "production_panels": 24, "panel_line_total": 13, "stations": {"Puente 1": {"count": 2, "share": 0.15384615384615385}}}, {"date": "2026-01-26", "production_panels": 37, "panel_line_total": 15, "stations": {"Puente 1": {"count": 3, "share": 0.2}}}, {"date": "2026-01-27", "production_panels": 28, "panel_line_total": 15, "stations": {"Puente 1": {"count": 3, "share": 0.2}}}, {"date": "2026-01-28", "production_panels": 35, "panel_line_total": 15, "stations": {"Puente 1": {"count": 3, "share": 0.2}}}, {"date": "2026-01-29", "production_panels": 32, "panel_line_total": 15, "stations": {"Puente 1": {"count": 3, "share": 0.2}}}, {"date": "2026-01-30", "production_panels": 13, "panel_line_total": 14, "stations": {"Puente 1": {"count": 2, "share": 0.14285714285714285}}}, {"date": "2026-02-02", "production_panels": 29, "panel_line_total": 12, "stations": {"Puente 1": {"count": 3, "share": 0.25}}}, {"date": "2026-02-03", "production_panels": 31, "panel_line_total": 12, "stations": {"Puente 1": {"count": 2, "share": 0.16666666666666666}}}, {"date": "2026-02-04", "production_panels": 30, "panel_line_total": 12, "stations": {"Puente 1": {"count": 2, "share": 0.16666666666666666}}}, {"date": "2026-02-05", "production_panels": 28, "panel_line_total": 12, "stations": {"Puente 1": {"count": 2, "share": 0.16666666666666666}}}, {"date": "2026-02-06", "production_panels": 18, "panel_line_total": 12, "stations": {"Puente 1": {"count": 2, "share": 0.16666666666666666}}}, {"date": "2026-02-07", "production_panels": 23, "panel_line_total": 12, "stations": {"Puente 1": {"count": 2, "share": 0.16666666666666666}}}, {"date": "2026-02-09", "production_panels": 29, "panel_line_total": 13, "stations": {"Puente 1": {"count": 3, "share": 0.23076923076923078}}}, {"date": "2026-02-10", "production_panels": 34, "panel_line_total": 12, "stations": {"Puente 1": {"count": 3, "share": 0.25}}}, {"date": "2026-02-11", "production_panels": 30, "panel_line_total": 12, "stations": {"Puente 1": {"count": 3, "share": 0.25}}}, {"date": "2026-02-12", "production_panels": 34, "panel_line_total": 12, "stations": {"Puente 1": {"count": 2, "share": 0.16666666666666666}}}, {"date": "2026-02-13", "production_panels": 26, "panel_line_total": 12, "stations": {"Puente 1": {"count": 2, "share": 0.16666666666666666}}}, {"date": "2026-02-16", "production_panels": 30, "panel_line_total": 12, "stations": {"Puente 1": {"count": 3, "share": 0.25}}}, {"date": "2026-02-17", "production_panels": 32, "panel_line_total": 11, "stations": {"Puente 1": {"count": 2, "share": 0.18181818181818182}}}];
    const stationNames = ["Puente 1"];

    function getMetricValue(row, metric) {
      if (metric === "panel_line_total") return row.panel_line_total;
      if (metric.startsWith("station_count::")) {
        const key = metric.split("::")[1];
        const station = row.stations[key];
        return station ? station.count : null;
      }
      if (metric.startsWith("station_share::")) {
        const key = metric.split("::")[1];
        const station = row.stations[key];
        return station ? station.share : null;
      }
      return null;
    }

    function pearson(x, y) {
      if (!x.length || x.length !== y.length || x.length < 2) return null;
      const meanX = x.reduce((a, b) => a + b, 0) / x.length;
      const meanY = y.reduce((a, b) => a + b, 0) / y.length;
      let num = 0;
      let denX = 0;
      let denY = 0;
      for (let i = 0; i < x.length; i += 1) {
        const dx = x[i] - meanX;
        const dy = y[i] - meanY;
        num += dx * dy;
        denX += dx * dx;
        denY += dy * dy;
      }
      const den = Math.sqrt(denX * denY);
      return den === 0 ? null : num / den;
    }

    function linearFit(x, y) {
      if (!x.length || x.length !== y.length || x.length < 2) return null;
      const meanX = x.reduce((a, b) => a + b, 0) / x.length;
      const meanY = y.reduce((a, b) => a + b, 0) / y.length;
      let num = 0;
      let den = 0;
      for (let i = 0; i < x.length; i += 1) {
        num += (x[i] - meanX) * (y[i] - meanY);
        den += (x[i] - meanX) ** 2;
      }
      if (den === 0) return null;
      const slope = num / den;
      const intercept = meanY - slope * meanX;
      return { slope, intercept };
    }

    function renderTimeSeries() {
      const x = rows.map((row) => row.date);
      const traces = [
        {
          x,
          y: rows.map((row) => row.production_panels),
          name: "Production (panels/day)",
          mode: "lines+markers",
          line: { color: "#2563eb", width: 3 },
          yaxis: "y1",
        },
        {
          x,
          y: rows.map((row) => row.panel_line_total),
          name: "Panel line attendance",
          mode: "lines+markers",
          line: { color: "#ea580c", width: 2 },
          yaxis: "y2",
        },
      ];

      stationNames.forEach((name) => {
        traces.push({
          x,
          y: rows.map((row) => row.stations[name] ? row.stations[name].count : null),
          name: `${name} attendance`,
          mode: "lines",
          line: { width: 1.5 },
          yaxis: "y2",
          visible: "legendonly",
        });
      });

      Plotly.newPlot("timeseries", traces, {
        margin: { t: 20, r: 70, l: 70, b: 50 },
        xaxis: { title: "Date" },
        yaxis: { title: "Production (panels/day)", side: "left", rangemode: "tozero" },
        yaxis2: {
          title: "Attendance (people)",
          overlaying: "y",
          side: "right",
          showgrid: false,
          rangemode: "tozero",
        },
        legend: { orientation: "h" },
      }, { responsive: true });
    }

    function renderScatter(metric) {
      const points = rows
        .map((row) => {
          const x = getMetricValue(row, metric);
          const y = row.production_panels;
          if (x === null || x === undefined || y === null || y === undefined) return null;
          return { date: row.date, x: Number(x), y: Number(y) };
        })
        .filter(Boolean);

      const x = points.map((p) => p.x);
      const y = points.map((p) => p.y);
      const corr = pearson(x, y);
      const fit = linearFit(x, y);

      const scatter = {
        x,
        y,
        mode: "markers",
        type: "scatter",
        name: "Daily points",
        text: points.map((p) => p.date),
        hovertemplate: "Date: %{text}<br>X: %{x}<br>Production: %{y}<extra></extra>",
        marker: { color: "#0369a1", size: 8, opacity: 0.75 },
      };

      const traces = [scatter];
      if (fit) {
        const sorted = [...x].sort((a, b) => a - b);
        const xMin = sorted[0];
        const xMax = sorted[sorted.length - 1];
        const trendX = [xMin, xMax];
        const trendY = trendX.map((v) => fit.intercept + fit.slope * v);
        traces.push({
          x: trendX,
          y: trendY,
          mode: "lines",
          type: "scatter",
          name: "Trendline",
          line: { color: "#dc2626", width: 2 },
        });
      }

      Plotly.newPlot("scatter", traces, {
        margin: { t: 20, r: 30, l: 70, b: 60 },
        xaxis: { title: "Selected attendance metric", rangemode: "tozero" },
        yaxis: { title: "Production (panels/day)", rangemode: "tozero" },
      }, { responsive: true });

      const statsEl = document.getElementById("scatterStats");
      const corrText = corr === null ? "n/a" : corr.toFixed(4);
      const slopeText = !fit ? "n/a" : fit.slope.toFixed(4);
      const interceptText = !fit ? "n/a" : fit.intercept.toFixed(4);
      statsEl.textContent = `n=${points.length} | pearson r=${corrText} | slope=${slopeText} | intercept=${interceptText}`;
    }

    renderTimeSeries();
    const selectEl = document.getElementById("metricSelect");
    renderScatter(selectEl.value);
    selectEl.addEventListener("change", (e) => renderScatter(e.target.value));
  </script>
</body>
</html>
